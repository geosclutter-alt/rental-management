name: Supabase Keep-Alive
on:
  schedule:
    - cron: '0 12 * * *'   # daily at noon UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/?apikey=${{ secrets.VITE_SUPABASE_ANON_KEY }}"
